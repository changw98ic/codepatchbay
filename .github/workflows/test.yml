name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium with system deps
        run: npx playwright install --with-deps chromium

      - name: Install rollup native binding (npm workspace bug workaround)
        run: npm install @rollup/rollup-linux-x64-gnu --no-save
        if: runner.os == 'Linux'

      - name: Run Node and shell tests
        run: npm test

      - name: Run Node typecheck
        run: npm run typecheck:node

      - name: Run web tests
        run: cd web && npm test -- --run
        if: hashFiles('web/package.json') != ''

      - name: Run web typecheck
        run: npm run typecheck:web
        if: hashFiles('web/package.json') != ''

      - name: Build web UI
        run: npm run build:web
        if: hashFiles('web/package.json') != ''

      - name: CI smoke test (cpb setup + demo)
        run: npm run build:node && node dist/scripts/ci-smoke.js

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check node scripts syntax
        run: |
          npm run build:node
          find dist/bridges dist/cli dist/core dist/runtime dist/server -name '*.js' | while read -r f; do
            node --check "$f" || exit 1
          done
