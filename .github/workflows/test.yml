name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install integration runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap redis-server redis-tools
          bwrap --version
          if [ "$(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || true)" = "1" ]; then
            sudo tee /etc/apparmor.d/cpb-bwrap >/dev/null <<'EOF'
          abi <abi/4.0>,
          include <tunables/global>

          /usr/bin/bwrap flags=(unconfined) {
            userns,
          }
          EOF
            sudo apparmor_parser -r /etc/apparmor.d/cpb-bwrap
          fi
          smoke_root="$(mktemp -d)"
          trap 'rm -rf "$smoke_root"' EXIT
          bwrap --die-with-parent \
            --proc /proc \
            --dev /dev \
            --ro-bind-try /bin /bin \
            --ro-bind-try /lib /lib \
            --ro-bind-try /lib64 /lib64 \
            --ro-bind-try /sbin /sbin \
            --ro-bind-try /usr /usr \
            --ro-bind-try /etc/hosts /etc/hosts \
            --ro-bind-try /etc/resolv.conf /etc/resolv.conf \
            --ro-bind-try /etc/ssl/cert.pem /etc/ssl/cert.pem \
            --ro-bind-try /etc/ssl/openssl.cnf /etc/ssl/openssl.cnf \
            --bind-try "$smoke_root" "$smoke_root" \
            --chdir "$smoke_root" \
            /bin/zsh -c 'true'
          redis-server --version
          redis-cli --version

      - name: Run Node and shell tests
        run: npm test

      - name: Run Node typecheck
        run: npm run typecheck:node

      - name: Run strict engine typecheck
        run: npm run typecheck:strict:engine

      - name: Run engine type-debt gate
        run: npm run typecheck:type-debt:engine

      - name: Run web tests
        run: cd web && npm test -- --run
        if: hashFiles('web/package.json') != ''

      - name: Run web typecheck
        run: npm run typecheck:web
        if: hashFiles('web/package.json') != ''

      - name: Build web UI
        run: npm run build:web
        if: hashFiles('web/package.json') != ''

      - name: CI smoke test (setup + Hub lifecycle)
        run: npm run build:node && node dist/scripts/ci-smoke.js

      - name: Run stabilization and release gates
        if: matrix.node-version == 22
        run: npm run verify:stabilization

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check node scripts syntax
        run: |
          npm run build:node
          find dist/bridges dist/cli dist/core dist/runtime dist/server -name '*.js' | while read -r f; do
            node --check "$f" || exit 1
          done
