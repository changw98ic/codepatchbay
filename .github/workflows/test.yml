name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:node

      - name: Run bash integration tests
        run: |
          chmod +x bridges/*.sh tests/*.sh
          npm run test:shell

      - name: Build web UI
        run: npm run build:web

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check bash scripts syntax
        run: |
          for f in bridges/*.sh tests/*.sh; do
            bash -n "$f" || exit 1
          done

      - name: Check node scripts syntax
        run: |
          for f in bridges/*.mjs tests/*.mjs; do
            node --check "$f" || exit 1
          done
          for f in server/index.js server/routes/*.js server/services/*.js; do
            node --check "$f" || exit 1
          done
